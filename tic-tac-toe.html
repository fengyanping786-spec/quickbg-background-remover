<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>井字棋 - AI对战（完善版）</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: #fff;
        }
        
        .container {
            max-width: 800px;
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 25px;
            padding: 40px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        header {
            text-align: center;
            margin-bottom: 40px;
        }
        
        h1 {
            font-size: 3rem;
            background: linear-gradient(90deg, #00dbde, #fc00ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            text-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }
        
        .subtitle {
            color: #a0a0c0;
            font-size: 1.2rem;
            opacity: 0.8;
        }
        
        .game-area {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
        }
        
        @media (max-width: 768px) {
            .game-area {
                grid-template-columns: 1fr;
            }
        }
        
        .board-section {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 20px;
            padding: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .board-section h2 {
            color: #00dbde;
            margin-bottom: 20px;
            font-size: 1.8rem;
            text-align: center;
        }
        
        .board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 10px;
            aspect-ratio: 1;
            max-width: 400px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 15px;
        }
        
        .cell {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 4rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        
        .cell:hover:not(.occupied):not(.disabled) {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }
        
        .cell.x {
            color: #00dbde;
            text-shadow: 0 0 20px rgba(0, 219, 222, 0.5);
        }
        
        .cell.o {
            color: #fc00ff;
            text-shadow: 0 0 20px rgba(252, 0, 255, 0.5);
        }
        
        .cell.win {
            animation: pulse 1s infinite;
            background: rgba(255, 255, 255, 0.1);
        }
        
        .cell.disabled {
            cursor: not-allowed;
            opacity: 0.7;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        .cell::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(45deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            transform: translateX(-100%);
            transition: transform 0.6s;
        }
        
        .cell:hover:not(.disabled)::before {
            transform: translateX(100%);
        }
        
        .info-section {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 20px;
            padding: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .player-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
        }
        
        .player {
            text-align: center;
            flex: 1;
        }
        
        .player.active {
            position: relative;
        }
        
        .player.active::after {
            content: '▶';
            position: absolute;
            top: 50%;
            right: -15px;
            transform: translateY(-50%);
            color: #00dbde;
            animation: bounce 1s infinite;
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(-50%) translateX(0); }
            50% { transform: translateY(-50%) translateX(5px); }
        }
        
        .player-name {
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 10px;
        }
        
        .player-x .player-name {
            color: #00dbde;
        }
        
        .player-o .player-name {
            color: #fc00ff;
        }
        
        .player-score {
            font-size: 2.5rem;
            font-weight: bold;
        }
        
        .vs {
            font-size: 1.2rem;
            color: #a0a0c0;
            padding: 0 20px;
        }
        
        .status {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 30px;
            text-align: center;
            font-size: 1.4rem;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid transparent;
            transition: all 0.3s;
        }
        
        .status.win {
            border-color: #4CAF50;
            background: rgba(76, 175, 80, 0.1);
            color: #4CAF50;
        }
        
        .status.draw {
            border-color: #FF9800;
            background: rgba(255, 152, 0, 0.1);
            color: #FF9800;
        }
        
        .controls {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }
        
        .btn {
            background: linear-gradient(90deg, #00dbde, #fc00ff);
            color: white;
            border: none;
            padding: 18px;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            position: relative;
            overflow: hidden;
        }
        
        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, #fc00ff, #00dbde);
            opacity: 0;
            transition: opacity 0.3s;
        }
        
        .btn:hover::before {
            opacity: 1;
        }
        
        .btn span {
            position: relative;
            z-index: 1;
        }
        
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(0, 219, 222, 0.3);
        }
        
        .btn:active {
            transform: translateY(0);
        }
        
        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
            box-shadow: 0 10px 25px rgba(255, 255, 255, 0.1);
        }
        
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }
        
        .difficulty-selector {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 25px;
            margin-top: 20px;
        }
        
        .difficulty-selector h3 {
            color: #a0a0c0;
            margin-bottom: 15px;
            font-size: 1.2rem;
        }
        
        .difficulty-buttons {
            display: flex;
            gap: 10px;
        }
        
        .difficulty-btn {
            flex: 1;
            padding: 12px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: #a0a0c0;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
        }
        
        .difficulty-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            color: white;
        }
        
        .difficulty-btn.active {
            background: linear-gradient(90deg, #00dbde, #fc00ff);
            color: white;
            border-color: transparent;
        }
        
        .difficulty-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-top: 30px;
        }
        
        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
        }
        
        .stat-value {
            font-size: 2rem;
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .stat-label {
            color: #a0a0c0;
            font-size: 0.9rem;
        }
        
        .winning-line {
            position: absolute;
            background: rgba(255, 255, 255, 0.8);
            z-index: 10;
            border-radius: 5px;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
        }
        
        footer {
            text-align: center;
            margin-top: 40px;
            color: #a0a0c0;
            font-size: 0.9rem;
            opacity: 0.7;
        }
        
        .ai-thinking {
            display: none;
            text-align: center;
            padding: 20px;
            color: #00dbde;
            font-size: 1.2rem;
            margin-top: 20px;
        }
        
        .ai-thinking.active {
            display: block;
            animation: fadeIn 0.3s;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        .thinking-dots {
            display: inline-block;
            animation: dots 1.5s infinite;
        }
        
        @keyframes dots {
            0%, 20% { content: '.'; }
            40% { content: '..'; }
            60%, 100% { content: '...'; }
        }
        
        .game-tips {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 20px;
            margin-top: 30px;
            font-size: 0.9rem;
            color: #a0a0c0;
        }
        
        .game-tips h3 {
            color: #00dbde;
            margin-bottom: 10px;
        }
        
        .game-tips ul {
            padding-left: 20px;
        }
        
        .game-tips li {
            margin-bottom: 8px;
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-gamepad"></i> 井字棋 AI</h1>
            <p class="subtitle">挑战人工智能，体验极小化极大算法</p>
        </header>
        
        <div class="game-area">
            <!-- 左侧：游戏棋盘 -->
            <div class="board-section">
                <h2><i class="fas fa-chess-board"></i> 游戏棋盘</h2>
                <div class="board" id="board">
                    <!-- 3x3棋盘由JS生成 -->
                </div>
                <div class="ai-thinking" id="aiThinking">
                    <i class="fas fa-brain"></i> AI思考中<span class="thinking-dots"></span>
                </div>
            </div>
            
            <!-- 右侧：游戏信息 -->
            <div class="info-section">
                <div class="player-info">
                    <div class="player player-x">
                        <div class="player-name">玩家 (X)</div>
                        <div class="player-score" id="playerXScore">0</div>
                    </div>
                    <div class="vs">VS</div>
                    <div class="player player-o">
                        <div class="player-name">AI (O)</div>
                        <div class="player-score" id="playerOScore">0</div>
                    </div>
                </div>
                
                <div class="status" id="status">
                    轮到 <span class="player-name" style="color: #00dbde;">玩家 (X)</span> 下棋
                </div>
                
                <div class="controls">
                    <button class="btn" id="newGameBtn">
                        <i class="fas fa-play"></i> <span>新游戏</span>
                    </button>
                    <button class="btn btn-secondary" id="resetScoreBtn">
                        <i class="fas fa-redo"></i> <span>重置分数</span>
                    </button>
                </div>
                
                <div class="difficulty-selector">
                    <h3><i class="fas fa-sliders-h"></i> AI难度</h3>
                    <div class="difficulty-buttons">
                        <button class="difficulty-btn active" data-difficulty="easy">简单</button>
                        <button class="difficulty-btn" data-difficulty="medium">中等</button>
                        <button class="difficulty-btn" data-difficulty="hard">困难</button>
                    </div>
                    <p style="margin-top: 10px; font-size: 0.8rem; color: #888;">
                        简单：随机下棋 | 中等：混合策略 | 困难：不可战胜
                    </p>
                </div>
                
                <div class="stats">
                    <div class="stat-card">
                        <div class="stat-value" id="gamesPlayed">0</div>
                        <div class="stat-label">游戏次数</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="playerWins">0</div>
                        <div class="stat-label">玩家胜利</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="aiWins">0</div>
                        <div class="stat-label">AI胜利</div>
                    </div>
                </div>
                
                <div class="game-tips">
                    <h3><i class="fas fa-lightbulb"></i> 游戏提示</h3>
                    <ul>
                        <li>玩家为 <span style="color: #00dbde;">X</span>，AI为 <span style="color: #fc00ff;">O</span></li>
                        <li>三子连线（横、竖、斜）即可获胜</li>
                        <li>困难模式下AI使用极小化极大算法，不可战胜</li>
                        <li>数据自动保存在浏览器中</li>
                    </ul>
                </div>
            </</div></div><footer><p>井字棋 AI &copy; 2024 | 使用极小化极大算法实现 | 数据存储在本地浏览器</p><p style="margin-top: 5px; font-size: 0.8rem;">玩法：玩家为 X，AI 为 O，三子连线获胜</p></footer></div><script>
// 井字棋游戏逻辑 - 完善版

// 游戏状态
const gameState = {
    board: Array(9).fill(''),
    currentPlayer: 'X', // X为玩家，O为AI
    gameActive: true,
    isAiThinking: false,
    scores: {
        playerX: 0,
        playerO: 0,
        draws: 0
    },
    stats: {
        gamesPlayed: 0,
        playerWins: 0,
        aiWins: 0
    },
    difficulty: 'hard', // easy, medium, hard
    winningLine: null
};

// 获胜组合
const winPatterns = [
    [0, 1, 2], [3, 4, 5], [6, 7, 8], // 横
    [0, 3, 6], [1, 4, 7], [2, 5, 8], // 竖
    [0, 4, 8], [2, 4, 6]             // 斜
];

// 初始化
function init() {
    createBoard();
    loadFromLocalStorage();
    updateUI();
    setupEventListeners();
    updateBoardState();
}

// 创建棋盘
function createBoard() {
    const board = document.getElementById('board');
    board.innerHTML = '';
    
    for (let i = 0; i < 9; i++) {
        const cell = document.createElement('div');
        cell.className = 'cell';
        cell.dataset.index = i;
        cell.addEventListener('click', () => handleCellClick(i));
        board.appendChild(cell);
    }
}

// 处理格子点击
function handleCellClick(index) {
    if (!gameState.gameActive || 
        gameState.board[index] !== '' || 
        gameState.currentPlayer !== 'X' ||
        gameState.isAiThinking) {
        return;
    }
    
    // 玩家下棋
    makeMove(index, 'X');
    
    // 检查游戏是否结束
    if (checkGameEnd()) return;
    
    // AI下棋
    gameState.currentPlayer = 'O';
    updateStatus();
    updateBoardState();
    
    // 显示AI思考中
    document.getElementById('aiThinking').classList.add('active');
    gameState.isAiThinking = true;
    
    // 根据难度设置不同的思考时间
    let thinkTime = 500;
    switch (gameState.difficulty) {
        case 'easy': thinkTime = 300 + Math.random() * 700; break;
        case 'medium': thinkTime = 500 + Math.random() * 1000; break;
        case 'hard': thinkTime = 800 + Math.random() * 1200; break;
    }
    
    // 延迟执行AI移动，增加真实感
    setTimeout(() => {
        aiMove();
        document.getElementById('aiThinking').classList.remove('active');
        gameState.isAiThinking = false;
        checkGameEnd();
        updateBoardState();
    }, thinkTime);
}

// 执行移动
function makeMove(index, player) {
    gameState.board[index] = player;
    const cell = document.querySelector(`.cell[data-index="${index}"]`);
    cell.textContent = player;
    cell.classList.add(player.toLowerCase());
    cell.classList.add('occupied');
}

// AI移动
function aiMove() {
    if (!gameState.gameActive) return;
    
    let moveIndex;
    
    switch (gameState.difficulty) {
        case 'easy':
            // 简单：随机移动，偶尔会犯错
            moveIndex = getRandomMove();
            break;
        case 'medium':
            // 中等：70%最优，30%随机
            moveIndex = Math.random() < 0.7 ? getBestMove() : getRandomMove();
            break;
        case 'hard':
            // 困难：总是最优移动（不可战胜）
            moveIndex = getBestMove();
            break;
    }
    
    if (moveIndex !== -1) {
        makeMove(moveIndex, 'O');
        gameState.currentPlayer = 'X';
        updateStatus();
    }
}

// 获取随机移动
function getRandomMove() {
    const emptyCells = gameState.board
        .map((cell, index) => cell === '' ? index : -1)
        .filter(index => index !== -1);
    
    return emptyCells.length > 0 ? 
        emptyCells[Math.floor(Math.random() * emptyCells.length)] : -1;
}

// 获取最佳移动（极小化极大算法）
function getBestMove() {
    // 如果是第一步，优先选择中心或角位
    const emptyCount = gameState.board.filter(cell => cell === '').length;
    if (emptyCount === 9) {
        // 第一步：中心最优，角位次优
        const firstMoves = [4, 0, 2, 6, 8];
        for (const move of firstMoves) {
            if (gameState.board[move] === '') return move;
        }
    }
    
    let bestScore = -Infinity;
    let bestMove = -1;
    
    for (let i = 0; i < 9; i++) {
        if (gameState.board[i] === '') {
            gameState.board[i] = 'O';
            let score = minimax(gameState.board, 0, false);
            gameState.board[i] = '';
            
            if (score > bestScore) {
                bestScore = score;
                bestMove = i;
            }
        }
    }
    
    return bestMove;
}

// 极小化极大算法
function minimax(board, depth, isMaximizing) {
    // 检查游戏状态
    const result = checkWinner(board);
    
    if (result !== null) {
        if (result === 'O') return 10 - depth;  // AI赢
        if (result === 'X') return depth - 10;  // 玩家赢
        return 0;  // 平局
    }
    
    if (isMaximizing) {
        let bestScore = -Infinity;
        for (let i = 0; i < 9; i++) {
            if (board[i] === '') {
                board[i] = 'O';
                let score = minimax(board, depth + 1, false);
                board[i] = '';
                bestScore = Math.max(score, bestScore);
            }
        }
        return bestScore;
    } else {
        let bestScore = Infinity;
        for (let i = 0; i < 9; i++) {
            if (board[i] === '') {
                board[i] = 'X';
                let score = minimax(board, depth + 1, true);
                board[i] = '';
                bestScore = Math.min(score, bestScore);
            }
        }
        return bestScore;
    }
}

// 检查获胜者
function checkWinner(board = gameState.board) {
    for (const pattern of winPatterns) {
        const [a, b, c] = pattern;
        if (board[a] && board[a] === board[b] && board[a] === board[c]) {
            return board[a];
        }
    }
    
    // 检查是否平局
    if (!board.includes('')) {
        return 'draw';
    }
    
    return null;
}

// 检查游戏是否结束
function checkGameEnd() {
    const winner = checkWinner();
    
    if (winner) {
        gameState.gameActive = false;
        gameState.stats.gamesPlayed++;
        
        if (winner === 'X') {
            gameState.scores.playerX++;
            gameState.stats.playerWins++;
            updateStatus(`🎉 玩家胜利！`);
            highlightWinningCells();
        } else if (winner === 'O') {
            gameState.scores.playerO++;
            gameState.stats.aiWins++;
            updateStatus(`🤖 AI胜利！`);
            highlightWinningCells();
        } else {
            gameState.scores.draws++;
            updateStatus(`🤝 平局！`);
        }
        
        saveToLocalStorage();
        updateUI();
        updateBoardState();
        return true;
    }
    
    return false;
}

// 高亮获胜的格子
function highlightWinningCells() {
    for (const pattern of winPatterns) {
        const [a, b, c] = pattern;
        if (gameState.board[a] && 
            gameState.board[a] === gameState.board[b] && 
            gameState.board[a] === gameState.board[c]) {
            
            pattern.forEach(index => {
                const cell = document.querySelector(`.cell[data-index="${index}"]`);
                cell.classList.add('win');
            });
            
            break;
        }
    }
}

// 更新状态显示
function updateStatus(message = null) {
    const status = document.getElementById('status');
    
    if (message) {
        status.textContent = message;
        if (message.includes('胜利')) {
            status.classList.add('win');
        } else if (message.includes('平局')) {
            status.classList.add('draw');
        }
    } else {
        status.classList.remove('win', 'draw');
        const playerName = gameState.currentPlayer === 'X' ? 
            '<span style="color: #00dbde;">玩家 (X)</span>' : 
            '<span style="color: #fc00ff;">AI (O)</span>';
        status.innerHTML = `轮到 ${playerName} 下棋`;
    }
    
    // 更新玩家活动状态
    document.querySelectorAll('.player').forEach(player => {
        player.classList.remove('active');
    });
    
    if (gameState.gameActive) {
        const activePlayer = gameState.currentPlayer === 'X' ? 
            document.querySelector('.player-x') : 
            document.querySelector('.player-o');
        if (activePlayer) activePlayer.classList.add('active');
    }
}

// 更新棋盘状态（启用/禁用格子）
function updateBoardState() {
    const cells = document.querySelectorAll('.cell');
    cells.forEach(cell => {
        const index = parseInt(cell.dataset.index);
        const isOccupied = gameState.board[index] !== '';
        const isDisabled = !gameState.gameActive || 
                          gameState.currentPlayer !== 'X' || 
                          gameState.isAiThinking ||
                          isOccupied;
        
        if (isDisabled) {
            cell.classList.add('disabled');
        } else {
            cell.classList.remove('disabled');
        }
    });
}

// 更新UI
function updateUI() {
    document.getElementById('playerXScore').textContent = gameState.scores.playerX;
    document.getElementById('playerOScore').textContent = gameState.scores.playerO;
    document.getElementById('gamesPlayed').textContent = gameState.stats.gamesPlayed;
    document.getElementById('playerWins').textContent = gameState.stats.playerWins;
    document.getElementById('aiWins').textContent = gameState.stats.aiWins;
}

// 新游戏
function newGame() {
    gameState.board = Array(9).fill('');
    gameState.currentPlayer = 'X';
    gameState.gameActive = true;
    gameState.isAiThinking = false;
    gameState.winningLine = null;
    
    // 重置棋盘
    document.querySelectorAll('.cell').forEach(cell => {
        cell.textContent = '';
        cell.className = 'cell';
        cell.classList.remove('x', 'o', 'occupied', 'win', 'disabled');
    });
    
    // 隐藏AI思考提示
    document.getElementById('aiThinking').classList.remove('active');
    
    updateStatus();
    updateUI();
    updateBoardState();
}

// 重置分数
function resetScore() {
    if (confirm('确定要重置所有分数和统计吗？')) {
        gameState.scores = { playerX: 0, playerO: 0, draws: 0 };
        gameState.stats = { gamesPlayed: 0, playerWins: 0, aiWins: 0 };
        saveToLocalStorage();
        updateUI();
        newGame();
    }
}

// 设置事件监听器
function setupEventListeners() {
    document.getElementById('newGameBtn').addEventListener('click', newGame);
    document.getElementById('resetScoreBtn').addEventListener('click', resetScore);
    
    // 难度选择
    document.querySelectorAll('.difficulty-btn').forEach(btn => {
        btn.addEventListener('click', function() {
            if (gameState.isAiThinking) return;
            
            document.querySelectorAll('.difficulty-btn').forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            gameState.difficulty = this.dataset.difficulty;
            
            // 保存难度设置
            saveToLocalStorage();
            
            // 如果游戏正在进行中，询问是否重新开始
            if (gameState.gameActive && gameState.currentPlayer === 'O') {
                if (confirm('切换难度将重新开始当前游戏，确定吗？')) {
                    newGame();
                }
            }
        });
    });
}

// 保存到本地存储
function saveToLocalStorage() {
    localStorage.setItem('ticTacToeState', JSON.stringify({
        scores: gameState.scores,
        stats: gameState.stats,
        difficulty: gameState.difficulty
    }));
}

// 从本地存储加载
function loadFromLocalStorage() {
    const saved = localStorage.getItem('ticTacToeState');
    if (saved) {
        try {
            const data = JSON.parse(saved);
            gameState.scores = data.scores || gameState.scores;
            gameState.stats = data.stats || gameState.stats;
            gameState.difficulty = data.difficulty || 'hard';
            
            // 设置活动难度按钮
            document.querySelectorAll('.difficulty-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.difficulty === gameState.difficulty);
            });
        } catch (e) {
            console.error('加载保存数据失败:', e);
        }
    }
}

// 初始化游戏
init();</script></body></html>
