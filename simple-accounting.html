<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>简易记账本</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }
        
        header {
            background: linear-gradient(90deg, #4CAF50, #2E7D32);
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        
        .subtitle {
            opacity: 0.9;
            font-size: 1.1rem;
        }
        
        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            padding: 30px;
        }
        
        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }
        
        .section {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
        }
        
        .section h2 {
            color: #2E7D32;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #e0e0e0;
            font-size: 1.5rem;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #555;
        }
        
        input, select, textarea {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }
        
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #4CAF50;
        }
        
        .btn {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 14px 25px;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        .btn:hover {
            background: #388E3C;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(76, 175, 80, 0.3);
        }
        
        .btn-delete {
            background: #f44336;
        }
        
        .btn-delete:hover {
            background: #d32f2f;
            box-shadow: 0 5px 15px rgba(244, 67, 54, 0.3);
        }
        
        .btn-export {
            background: #2196F3;
        }
        
        .btn-export:hover {
            background: #1976D2;
            box-shadow: 0 5px 15px rgba(33, 150, 243, 0.3);
        }
        
        .btn-group {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }
        
        .btn-group .btn {
            flex: 1;
        }
        
        .records-list {
            max-height: 400px;
            overflow-y: auto;
            margin-top: 20px;
        }
        
        .record-item {
            background: white;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
            border-left: 5px solid #4CAF50;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: transform 0.2s;
        }
        
        .record-item:hover {
            transform: translateX(5px);
        }
        
        .record-item.expense {
            border-left-color: #f44336;
        }
        
        .record-item.income {
            border-left-color: #4CAF50;
        }
        
        .record-info {
            flex: 1;
        }
        
        .record-title {
            font-weight: 600;
            font-size: 1.1rem;
            margin-bottom: 5px;
        }
        
        .record-meta {
            display: flex;
            gap: 15px;
            color: #666;
            font-size: 0.9rem;
        }
        
        .record-amount {
            font-weight: 700;
            font-size: 1.2rem;
            min-width: 100px;
            text-align: right;
        }
        
        .record-amount.income {
            color: #4CAF50;
        }
        
        .record-amount.expense {
            color: #f44336;
        }
        
        .delete-btn {
            background: none;
            border: none;
            color: #999;
            cursor: pointer;
            font-size: 1.2rem;
            padding: 5px;
            margin-left: 10px;
            transition: color 0.2s;
        }
        
        .delete-btn:hover {
            color: #f44336;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-top: 20px;
        }
        
        .stat-card {
            background: white;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.05);
        }
        
        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            margin: 10px 0;
        }
        
        .stat-income {
            color: #4CAF50;
        }
        
        .stat-expense {
            color: #f44336;
        }
        
        .stat-balance {
            color: #2196F3;
        }
        
        .stat-label {
            color: #666;
            font-size: 0.9rem;
        }
        
        .category-chart {
            height: 200px;
            margin-top: 20px;
            display: flex;
            align-items: flex-end;
            gap: 10px;
            padding: 20px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.05);
        }
        
        .chart-bar {
            flex: 1;
            background: linear-gradient(to top, #4CAF50, #8BC34A);
            border-radius: 5px 5px 0 0;
            position: relative;
            min-height: 5px;
        }
        
        .chart-bar.expense {
            background: linear-gradient(to top, #f44336, #FF9800);
        }
        
        .chart-label {
            position: absolute;
            bottom: -25px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 0.8rem;
            color: #666;
            transform: rotate(-45deg);
            transform-origin: top left;
        }
        
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #999;
        }
        
        .empty-state i {
            font-size: 3rem;
            margin-bottom: 20px;
            opacity: 0.3;
        }
        
        footer {
            text-align: center;
            padding: 20px;
            color: #666;
            font-size: 0.9rem;
            border-top: 1px solid #eee;
            background: #f8f9fa;
        }
        
        .total-section {
            background: linear-gradient(90deg, #2196F3, #1976D2);
            color: white;
            padding: 20px;
            border-radius: 15px;
            margin-top: 20px;
            text-align: center;
        }
        
        .total-amount {
            font-size: 2.5rem;
            font-weight: 700;
            margin: 10px 0;
        }
        
        .total-label {
            opacity: 0.9;
            font-size: 1.1rem;
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-wallet"></i> 简易记账本</h1>
            <p class="subtitle">记录每一笔收支，掌握财务状况</p>
        </header>
        
        <div class="main-content">
            <!-- 左侧：添加记录 -->
            <div class="section">
                <h2><i class="fas fa-plus-circle"></i> 添加记录</h2>
                <div class="form-group">
                    <label for="recordType">类型</label>
                    <select id="recordType">
                        <option value="income">收入</option>
                        <option value="expense">支出</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="amount">金额 (元)</label>
                    <input type="number" id="amount" placeholder="0.00" min="0" step="0.01">
                </div>
                
                <div class="form-group">
                    <label for="category">分类</label>
                    <select id="category">
                        <option value="餐饮">餐饮</option>
                        <option value="交通">交通</option>
                        <option value="购物">购物</option>
                        <option value="娱乐">娱乐</option>
                        <option value="住房">住房</option>
                        <option value="医疗">医疗</option>
                        <option value="教育">教育</option>
                        <option value="工资">工资</option>
                        <option value="投资">投资</option>
                        <option value="其他">其他</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="description">描述</label>
                    <input type="text" id="description" placeholder="例如：午餐、交通费、工资...">
                </div>
                
                <div class="form-group">
                    <label for="date">日期</label>
                    <input type="date" id="date" value="">
                </div>
                
                <div class="btn-group">
                    <button class="btn" id="addRecordBtn">
                        <i class="fas fa-save"></i> 保存记录
                    </button>
                    <button class="btn btn-delete" id="clearAllBtn">
                        <i class="fas fa-trash"></i> 清空所有
                    </button>
                </div>
            </div>
            
            <!-- 右侧：统计 -->
            <div class="section">
                <h2><i class="fas fa-chart-pie"></i> 统计概览</h2>
                
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-label">总收入</div>
                        <div class="stat-value stat-income" id="totalIncome">0.00</div>
                        <div class="stat-label">元</div>
                    </div>
                    
                    <div class="stat-card">
                        <div class="stat-label">总支出</div>
                        <div class="stat-value stat-expense" id="totalExpense">0.00</div>
                        <div class="stat-label">元</div>
                    </div>
                    
                    <div class="stat-card">
                        <div class="stat-label">结余</div>
                        <div class="stat-value stat-balance" id="balance">0.00</div>
                        <div class="stat-label">元</div>
                    </div>
                    
                    <div class="stat-card">
                        <div class="stat-label">记录数</div>
                        <div class="stat-value" id="recordCount">0</div>
                        <div class="stat-label">笔</div>
                    </div>
                </div>
                
                <div class="total-section">
                    <div class="total-label">当前总资产</div>
                    <div class="total-amount" id="totalAssets">0.00</div>
                    <div class="total-label">元</div>
                </div>
                
                <div class="btn-group" style="margin-top: 20px;">
                    <button class="btn btn-export" id="exportCSVBtn">
                        <i class="fas fa-file-export"></i> 导出CSV
                    </button>
                    <button class="btn" id="importCSVBtn">
                        <i class="fas fa-file-import"></i> 导入CSV
                    </button>
                </div>
            </div>
            
            <!-- 下方：记录列表 -->
            <div class="section" style="grid-column: 1 / -1;">
                <h2><i class="fas fa-list"></i> 收支记录</h2>
                
                <div class="records-list" id="recordsList">
                    <div class="empty-state" id="emptyState">
                        <i class="fas fa-receipt"></i>
                        <p>还没有记录，添加第一笔收支吧！</p>
                    </div>
                </div>
            </div>
        </div>
        
        <footer>
            <p>简易记账本 &copy; 2024 | 数据存储在本地浏览器中，请定期导出备份</p>
            <p style="margin-top: 5px; font-size: 0.8rem; opacity: 0.7;">
                功能：添加/删除记录、分类统计、导出CSV、本地存储
            </p>
        </footer>
    </div>

    <script>
        // 初始化数据
        let records = JSON.parse(localStorage.getItem('accountingRecords')) || [];
        
        // 设置今天为默认日期
        document.getElementById('date').valueAsDate = new Date();
        
        // 渲染记录列表
        function renderRecords() {
            const recordsList = document.getElementById('recordsList');
            const emptyState = document.getElementById('emptyState');
            
            if (records.length === 0) {
                emptyState.style.display = 'block';
                recordsList.innerHTML = '';
                recordsList.appendChild(emptyState);
                return;
            }
            
            emptyState.style.display = 'none';
            
            // 按日期倒序排序
            const sortedRecords = [...records].sort((a, b) => new Date(b.date) - new Date(a.date));
            
            recordsList.innerHTML = sortedRecords.map((record, index) => `
                <div class="record-item ${record.type}">
                    <div class="record-info">
                        <div class="record-title">${record.description}</div>
                        <div class="record-meta">
                            <span><i class="fas fa-tag"></i> ${record.category}</span>
                            <span><i class="fas fa-calendar"></i> ${formatDate(record.date)}</span>
                        </div>
                    </div>
                    <div class="record-amount ${record.type}">
                        ${record.type === 'income' ? '+' : '-'}¥${record.amount.toFixed(2)}
                    </div>
                    <button class="delete-btn" onclick="deleteRecord(${record.id})">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
            `).join('');
        }
        
        // 格式化日期
        function formatDate(dateString) {
            const date = new Date(dateString);
            return `${date.getMonth() + 1}/${date.getDate()}`;
        }
        
        // 更新统计
        function updateStats() {
            const totalIncome = records
                .filter(r => r.type === 'income')
                .reduce((sum, r) => sum + r.amount, 0);
            
            const totalExpense = records
                .filter(r => r.type === 'expense')
                .reduce((sum, r) => sum + r.amount, 0);
            
            const balance = totalIncome - totalExpense;
            const recordCount = records.length;
            
            document.getElementById('totalIncome').textContent = totalIncome.toFixed(2);
            document.getElementById('totalExpense').textContent = totalExpense.toFixed(2);
            document.getElementById('balance').textContent = balance.toFixed(2);
            document.getElementById('recordCount').textContent = recordCount;
            document.getElementById('totalAssets').textContent = balance.toFixed(2);
        }
        
        // 添加记录
        document.getElementById('addRecordBtn').addEventListener('click', () => {
            const type = document.getElementById('recordType').value;
            const amount = parseFloat(document.getElementById('amount').value);
            const category = document.getElementById('category').value;
            const description = document.getElementById('description').value.trim();
            const date = document.getElementById('date').value;
            
            // 验证输入
            if (!amount || amount <= 0) {
                alert('请输入有效的金额');
                return;
            }
            
            if (!description) {
                alert('请输入描述');
                return;
            }
            
            if (!date) {
                alert('请选择日期');
                return;
            }
            
            // 创建新记录
            const newRecord = {
                id: Date.now(),
                type,
                amount,
                category,
                description,
                date,
                createdAt: new Date().toISOString()
            };
            
            records.push(newRecord);
            saveToLocalStorage();
            renderRecords();
            updateStats();
            
            // 清空表单
            document.getElementById('amount').value = '';
            document.getElementById('description').value = '';
            document.getElementById('date').valueAsDate = new Date();
            
            // 显示成功消息
            showMessage('记录添加成功！', 'success');
        });
        
        // 删除记录
        window.deleteRecord = function(id) {
            if (confirm('确定要删除这条记录吗？')) {
                const index = records.findIndex(r => r.id === id);
                if (index !== -1) {
                    records.splice(index, 1);
                    saveToLocalStorage();
                    renderRecords();
                    updateStats();
                    showMessage('记录已删除', 'info');
                }
            }
        };
        
        // 清空所有记录
        document.getElementById('clearAllBtn').addEventListener('click', () => {
            if (records.length === 0) {
                alert('没有记录可清空');
                return;
            }
            
            if (confirm('确定要清空所有记录吗？此操作不可撤销！')) {
                records = [];
                saveToLocalStorage();
                renderRecords();
                updateStats();
                showMessage('所有记录已清空', 'warning');
            }
        });
        
        // 导出CSV
        document.getElementById('exportCSVBtn').addEventListener('click', () => {
            if (records.length === 0) {
                alert('没有记录可导出');
                return;
            }
            
            // CSV头部
            let csv = '类型,金额,分类,描述,日期\n';
            
            // 添加数据行
            records.forEach(record => {
                const typeText = record.type === 'income' ? '收入' : '支出';
                csv += `${typeText},${record.amount},${record.category},${record.description},${record.date}\n`;
            });
            
            // 创建下载链接
            const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `记账记录_${new Date().toISOString().slice(0, 10)}.csv`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
            
            showMessage('CSV文件已导出', 'success');
        });
        
        // 导入CSV（简化版）
        document.getElementById('importCSVBtn').addEventListener('click', () => {
            alert('导入功能需要文件选择器，请在完整环境中使用。\n\n当前演示版本请手动添加记录。');
        });
        
        // 保存到本地存储
        function saveToLocalStorage() {
            localStorage.setItem('accountingRecords', JSON.stringify(records));
        }
        
        // 显示消息
        function showMessage(text, type) {
            // 创建消息元素
            const message = document.createElement('div');
            message.textContent = text;
            message.style.cssText = `
                position: fixed;
                top: 20px;
                right: 20px;
                background: ${type === 'success' ? '#4CAF50' : type === 'warning' ? '#FF9800' : '#2196F3'};
                color: white;
                padding: 15px 25px;
                border-radius: 10px;
                box-shadow: 0 5px 15px rgba(0,0,0,0.2);
                z-index: 1000;
                animation: slideIn 0.3s ease;
            `;
            
            document.body.appendChild(message);
            
            // 3秒后移除
            setTimeout(() => {
                message.style.animation = 'slideOut 0.3s ease';
                setTimeout(() => {
                    document.body.removeChild(message);
                }, 300);
            }, 3000);
        }
        
        // 添加CSS动画
        const style = document.createElement('style');
        style.textContent = `
            @keyframes slideIn {
                from { transform: translateX(100%); opacity: 0; }
                to { transform: translateX(0); opacity: 1; }
            }
            @keyframes slideOut {
                from { transform: translateX(0); opacity: 1; }
                to { transform: translateX(100%); opacity: 0; }
            }
        `;
        document.head.appendChild(style);
        
        // 初始化
        renderRecords();
        updateStats();
