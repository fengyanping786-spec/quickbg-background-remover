name = "quickbg-worker"
compatibility_date = "2024-01-01"
main = "src/index.js"

[vars]
REMOVE_BG_API_KEY = "{{ secrets.REMOVE_BG_API_KEY }}"

[dev]
port = 8787
local_protocol = "http"
upstream_protocol = "https"

# 路由配置
[[routes]]
pattern = "api.quickbg.ai/*"
zone_name = "quickbg.ai"

[[routes]]
pattern = "*.quickbg-worker.*.workers.dev/*"
zone_name = "workers.dev"

# 环境配置
[env.production]
name = "quickbg-worker-prod"

[env.staging]
name = "quickbg-worker-staging"